<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories</title>
    <script
      src="https://kit.fontawesome.com/8d7557c58b.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="assets/img/tags.png">
    
  </head>
  <body>
    <!-- <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4"> -->
      <div id="injected">
      <header class="header-section">
        <div
          class="d-flex justify-content-between align-items-center m-1 px-4 flex-wrap"
        >
          <div class="">
            <h2 class="header-title fw-bold pt-3">Categories</h2>
            <p class="text-muted d-inline-block">
              Manage -Add, edit, delete- Your products categories.
            </p>
          </div>
          <button
            class="add-category-btn btn primary-btn text-white shadow-lg mb-3"
          >
            <i class="fa-solid fa-plus"></i> Add Category
          </button>
        </div>
      </header>
      <!--^ Table-->
      <section class="p-3">
        <div class="table-responsive">
          <table class="table table-striped">
            <thead class="">
              <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </section>
      <!--^Form Dialog -->
      <dialog
        id="category-dialog"
        class="category-dialog rounded border border-2 m-auto p-3"
      >
        <form>
          <div
            class="dialog-header d-flex justify-content-between align-items-center"
          >
            <h5 class="m-0 mb-3">Add Category</h5>
            <button class="btn-close" id="dialog-close" type="button"></button>
          </div>
          <div class="dialog-body">
            <div class="mb-3">
              <label for="category-name" class="form-label"
                >Category Name <span class="text-danger">*</span></label
              >
              <input
                type="text"
                class="form-control"
                placeholder="e.g Electronics"
                id="category-name"
              />
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
              <textarea
                name="description"
                id="description"
                rows="4"
                cols="50"
                class="form-control"
                placeholder="Category Description"
                maxlength="50"
              ></textarea>
            </div>
          </div>

          <div class="dialog-footer d-flex gap-1">
            <button class="cancel-btn btn btn-light" type="button">Cancel</button>
            <button class="submit-new-category btn primary-btn text-white" type="button">Add Category</button>
          </div>
        </form>
      </dialog>
      </div>
    <!-- </main> -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="js/categories.js" type="module"></script>
    <script src="js/navbar.js" type="module"></script>
    <script src="assets/js/color-modes.js"></script>
  </body>
</html>
