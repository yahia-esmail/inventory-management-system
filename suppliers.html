<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suppliers</title>
    <script
      src="https://kit.fontawesome.com/8d7557c58b.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="./css/table.css"> -->

      <link rel="stylesheet" href="css/style.css" />
      <link rel="icon" type="image/png" href="assets/img/people.png">

  </head>
  <body>
    <main id="injected">
    <!-- <div class="search-section p-3 mb-3">
      <input
        class="search w-100 mx-lg-1 rounded border border-secondary-subtle p-lg-1 px-lg-3"
        placeholder="Search suppliers, contacts, or addresses"
      />
    </div> -->

    
    <header class="header-section p-3">
      <div
        class="d-flex justify-content-between align-items-center m-1 px-4 flex-wrap"
      >
        <div class="">
          <h3 class="header-title fw-bold">Suppliers</h3>
          <p class="text-muted d-inline-block">
            Directly manage and monitor your strategic supply chain partners.
          </p>
        </div>
        <button
          class="add-supplier-btn btn primary-btn text-white shadow-lg mb-3"
        >
          <i class="fa-solid fa-plus"></i> Add Supplier
        </button>
      </div>
    </header>

  <div class="card mb-2 mx-3">
        <div class="card-body">
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <div class="input-group flex-grow-1" style="min-width: 200px">
              <span class="input-group-text">
                <i class="fa-solid fa-magnifying-glass"></i>
              </span>
              <input
                type="text"
                class="form-control search"
                placeholder="Search by name, contact-person or phone..."
              />
            </div>
          </div>
        </div>
      </div>

    <section class="p-3">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead class="">
            <tr>
              <th>Supplier Name</th>
              <th>Contact Person</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <dialog
      id="supplierDialog"
      class="supplier-dialog rounded border border-2 m-auto p-3"
    >
      <form>
        <div
          class="dialog-header d-flex justify-content-between align-items-center"
        >
          <h5 class="m-0 mb-3">Add New Supplier</h5>

          <button class="btn-close btn-dialog-close" type="button"></button>
        </div>

        <div class="dialog-body">
          <div class="mb-3">
            <label class="form-label">Supplier Name <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              placeholder="e.g. Tech Parts inc."
              id="supplier-name"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Primary Contact Name <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              placeholder="Full name of contact person"
              id="contact-person"
            />
          </div>

          <div class="row mb-md-3 mb-0">
            <div class="col-12 col-md-6 mb-3 mb-md-0">
              <label class="form-label">Email Address <span class="text-danger">*</span></label>
              <input
                type="email"
                class="form-control"
                placeholder="contact@supplier.com"
                id="supplier-email"
              />
            </div>
            <div class="col-12 col-md-6 mb-3 mb-md-0">
              <label class="form-label">Phone Number <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                placeholder="01100000000"
                id="supplier-phone"
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Address <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              placeholder="Street address, City, Country"
              id="supplier-address"
            />
          </div>
        </div>

        <div class="dialog-footer d-flex gap-1">
          <button class="cancel-btn btn btn-light" type="button">Cancel</button>
          <button
            class="submit-new-supplier btn primary-btn text-white"
            type="button"
          >
            Add Supplier
          </button>
        </div>
      </form>
    </dialog>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./js/suppliers.js" type="module"></script>
    <script src="assets/js/color-modes.js"></script>
  </body>
</html>
