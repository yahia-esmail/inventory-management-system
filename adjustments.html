<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adjustment</title>
    <script
      src="https://kit.fontawesome.com/8d7557c58b.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="assets/img/slider.png">

    
  </head>
  <body>
    <!-- <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4"> -->
      <div id="injected">
      <header class="header-section">
        <div
          class="d-flex justify-content-between align-items-center m-1 px-4 flex-wrap"
        >
          <div class="">
            <h2 class="header-title fw-bold pt-3">Stock Adjustments</h2>
            <p class="text-muted d-inline-block">
              Increase or decrease Stock products quatities with a reason for every change.
            </p>
          </div>
          <button
            class="add-adjustment-btn btn primary-btn text-white shadow-lg mb-3"
          >
            <i class="fa-solid fa-plus"></i> Add Adjustment
          </button>
        </div>
      </header>
      <!--^ Table-->
      <section class="p-3">
        <div class="table-responsive">
          <table class="table table-striped">
            <thead class="">
              <tr>
                <th>Date</th>
                <th>Product</th>
                <th>Type</th>
                <th>Quantity</th>
                <th>Reason</th>
              </tr>
            </thead>
            <!-- Table Body -->
            <tbody id="adjustments-table">
            </tbody>
          </table>
        </div>
      </section>
      <!--^Form Dialog -->
      <dialog
        id="adjustment-dialog"
        class="adjustment-dialog rounded border border-2 m-auto p-3"
      >
        <form>
            <!-- Form Header -->
          <div
            class="dialog-header d-flex justify-content-between align-items-center"
          >
            <h5 class="m-0 mb-3"><i class="fa-solid fa-sliders"></i> Add Adjustment</h5>
            <button class="btn-close" id="dialog-close" type="button"></button>
          </div>
          <!-- form body -->
          <div class="dialog-body">
            <!-- Product Selection -->
            <div class="mb-3">
                <label for="product-select" class="form-label">Product <span class="text-danger">*</span></label>
                <select name="product-select" class="form-select" id="product-select">
                    <option value="" disabled selected>Choose a Product...</option>
                    <!-- Products' Names from db -->
                </select>
                <!-- Stock hint to appear after selecting a product -->
                 <div class="stock-hint" id="stock-hint"></div>
            </div>

            <!-- Type Toggle Buttons -->
            <div class="mb-3">
                <label for="adjustment-type" class="form-label">Adjustment Type <span class="text-danger">*</span></label>
                <div class="type-toggle">
                    <button id="type-decrease" class="type-btn py-1 px-2 rounded-pill" type="button"><i class="fa-solid fa-minus"></i> Decrease</button>
                    <button id="type-increase" class="type-btn py-1 px-2 rounded-pill" type="button"><i class="fa-solid fa-plus"></i> Increase</button>
                </div>
            </div>

            <!-- Quantity Input -->
            <div class="mb-3">
              <label for="quantity" class="form-label"
                >Quantity <span class="text-danger">*</span></label
              >
              <input
                type="number"
                min="1"
                step="1"
                class="form-control"
                placeholder="e.g 22"
                id="quantity"
              />
            </div>

            <!-- Reason Input -->
            <div class="mb-3">
              <label for="reason" class="form-label">Reason <span class="text-danger">*</span></label>
              <textarea
                name="reason"
                id="reason"
                rows="4"
                cols="50"
                class="form-control"
                placeholder="e.g Damage in storage, stock count correction..."
                maxlength="100"
              ></textarea>
              <div class="form-text">Min 5 characters. Max 120.</div>
            </div>
          </div>

          <!-- Actions -->
          <div class="dialog-footer d-flex gap-2">
            <button id="cancel-btn" class="btn btn-light" type="button">Cancel</button>
            <button id="submit-adjustment" class="btn primary-btn text-white" type="button">
                <i class="fa-solid fa-check me-1"></i> Apply Adjustment
            </button>
          </div>
        </form>
      </dialog>
      </div>
    <!-- </main> -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="js/adjustments.js" type="module"></script>
    <script src="js/navbar.js" type="module"></script>
    <script src="assets/js/color-modes.js"></script>
  </body>
</html>
