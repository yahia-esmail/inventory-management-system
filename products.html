<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Products</title>
    <script
      src="https://kit.fontawesome.com/8d7557c58b.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <script src="/assets/js/color-modes.js"></script>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" type="image/png" href="assets/img/products.png" />
    <style>
      .istock,
      .istock:hover {
        background-color: #dcfce7;
        color: #15803d;
        font-weight: bold;
        cursor: default;
      }
      .lstock,
      .lstock:hover {
        background-color: #fef3c7;
        color: #b45309;
        font-weight: bold;
        cursor: default;
      }
      .ostock,
      .ostock:hover {
        background-color: #fee2e2;
        color: #b91c1c;
        font-weight: bold;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <!-- Add Product Dialog -->
    <dialog
      id="productDialog"
      class="product-dialog rounded border border-2 m-auto p-3"
    >
      <div
        class="dialog-header d-flex justify-content-between align-items-center"
      >
        <h5 class="mb-3">Add New Product</h5>
        <button class="btn-close" onclick="dialog.close()"></button>
      </div>
      <div class="dialog-body">
        <div class="mb-3">
          <label class="form-label"
            >Product Name <span class="text-danger">*</span></label
          >
          <input
            type="text"
            class="form-control"
            id="dialog-prod-name"
            placeholder="e.g. Ergonomic Keyboard"
          />
        </div>
        <div class="row mb-3">
          <div class="col">
            <label class="form-label"
              >SKU <span class="text-danger">*</span></label
            >
            <input
              type="text"
              class="form-control"
              id="dialog-sku"
              placeholder="SKU-1002"
            />
          </div>
          <div class="col">
            <label class="form-label"
              >Unit Price (EGP) <span class="text-danger">*</span></label
            >
            <input
              type="number"
              id="dialog-price"
              class="form-control"
              placeholder="0.00"
            />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label"
            >Category <span class="text-danger">*</span></label
          >
          <select class="form-select" id="dialog-select-cat">
            <option>Select Category</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label"
            >Supplier <span class="text-danger">*</span></label
          >
          <select class="form-select" id="dialog-select-supp">
            <option>Select Supplier</option>
          </select>
        </div>
        <div class="row">
          <div class="col">
            <label class="form-label"
              >Initial Quantity <span class="text-danger">*</span></label
            >
            <input
              type="number"
              id="dialog-quantity"
              class="form-control"
              value="0"
            />
          </div>
          <div class="col">
            <label class="form-label"
              >Reorder Level <span class="text-danger">*</span></label
            >
            <input
              type="number"
              id="dialog-reorder"
              class="form-control"
              value="10"
            />
          </div>
        </div>
      </div>
      <div class="dialog-footer d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" onclick="dialog.close()">
          Cancel
        </button>
        <button class="btn primary-btn add-prod-dialog">Add Product</button>
      </div>
    </dialog>

    <!-- Edit Product Dialog -->
    <dialog
      id="editDialog"
      class="category-dialog rounded border border-2 m-auto p-3"
    >
      <div
        class="dialog-header d-flex justify-content-between align-items-center"
      >
        <h5 class="mb-3">Edit Product</h5>
        <button class="btn-close" onclick="editDialog.close()"></button>
      </div>
      <div class="dialog-body">
        <div class="mb-3">
          <label class="form-label">Product Name</label>
          <input
            type="text"
            class="form-control"
            id="dialog-edit-name"
            placeholder="e.g. Ergonomic Keyboard"
          />
        </div>
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">SKU</label>
            <input
              type="text"
              class="form-control"
              id="dialog-edit-sku"
              placeholder="SKU-1002"
            />
          </div>
          <div class="col">
            <label class="form-label">Unit Price (EGP)</label>
            <input
              type="number"
              id="dialog-edit-price"
              class="form-control"
              placeholder="0.00"
            />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select" id="dialog-select-cat-edit">
            <option>Select Category</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Supplier</label>
          <select class="form-select" id="dialog-select-supp-edit">
            <option>Select Supplier</option>
          </select>
        </div>
        <div class="row">
          <div class="col">
            <label class="form-label text-muted">
              Current Quantity:
              <span id="edit-current-qty" class="fw-bold">—</span>
            </label>
            <p class="form-text">
              To change quantity, use the
              <a href="adjustments.html">Stock Adjustments</a> page.
            </p>
          </div>
          <div class="col">
            <label class="form-label">Reorder Level</label>
            <input
              type="number"
              id="dialog-reorder-edit"
              class="form-control"
              value="10"
            />
          </div>
        </div>
      </div>
      <div class="dialog-footer d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" onclick="editDialog.close()">
          Cancel
        </button>
        <button class="btn primary-btn edit-dialog">Save Changes</button>
      </div>
    </dialog>

    <div id="injected" class="container-fluid p-4">
      <div
        class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4"
      >
        <div>
          <h1 class="header-title">Products</h1>
          <p>Manage your inventory stock levels and catalog.</p>
        </div>
        <button class="btn primary-btn" onclick="dialog.showModal()">
          <i class="fa-solid fa-plus"></i> Add Product
        </button>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="card text-center p-3 h-100">
            <p class="text-muted small mb-1">TOTAL PRODUCTS</p>
            <p id="total-prods" class="fs-4 fw-bold mb-0">0</p>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card text-center p-3 h-100">
            <p class="text-muted small mb-1">LOW STOCK</p>
            <p id="low-stock" class="fs-4 fw-bold mb-0">0</p>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card text-center p-3 h-100">
            <p class="text-muted small mb-1">OUT OF STOCK</p>
            <p id="out-stock" class="fs-4 fw-bold mb-0">0</p>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card text-center p-3 h-100">
            <p class="text-muted small mb-1">TOTAL VALUE</p>
            <p id="total-value" class="fs-4 fw-bold mb-0">$0</p>
          </div>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <div class="input-group flex-grow-1" style="min-width: 200px">
              <span class="input-group-text">
                <i class="fa-solid fa-magnifying-glass"></i>
              </span>
              <input
                type="text"
                class="form-control search-input"
                placeholder="Search by SKU, name, or category..."
              />
            </div>
            <select
              class="form-select filter-select-cat"
              style="max-width: 180px"
            >
              <option value="all">Category: All</option>
            </select>
            <select
              class="form-select filter-select-status"
              style="max-width: 180px"
            >
              <option value="all">Status: All</option>
              <option>In Stock</option>
              <option>Out of Stock</option>
              <option>Low Stock</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-bordered table-hover">
              <thead class="table-dark">
                <tr>
                  <th>SKU</th>
                  <th>PRODUCT NAME</th>
                  <th>CATEGORY</th>
                  <th>STOCK LEVEL</th>
                  <th>STATUS</th>
                  <th>ACTION</th>
                </tr>
              </thead>
              <tbody class="datarows">
                <tr>
                  <td colspan="6" class="text-center text-muted">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div
            class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3"
          >
            <p id="pagination-results" class="mb-0 text-muted small">results</p>
            <div class="d-flex gap-2 mx-5">
              <button
                id="previous-btn"
                class="btn btn-outline-secondary btn-sm"
              >
                PREVIOUS
              </button>
              <button id="next-btn" class="btn btn-outline-secondary btn-sm">
                NEXT
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const dialog = document.getElementById("productDialog");
    </script>
    <script src="./js/navbar.js" type="module"></script>
    <script src="./js/products.js" type="module"></script>
  </body>
</html>
